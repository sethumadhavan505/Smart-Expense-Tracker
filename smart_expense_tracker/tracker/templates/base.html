<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Expense Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8f9fc;
      }
      .navbar {
        background: #4e73df;
      }
      .card {
        border: none;
        border-radius: 12px;
      }
      .btn-primary {
        background: #4e73df;
        border: none;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-dark shadow-sm mb-4">
      <div class="container">
        <!-- Left side: Brand Name -->
        <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">
          💰 ExpenseTracker
        </a>

        <!-- Right side: User info & Logout -->
        <div class="d-flex align-items-center">
          {% if user.is_authenticated %}
          <!-- User login panni irundha mattum idhu theriyum -->
          <span class="text-white me-3">Hi, {{ user.username }}</span>
          <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-light"
            >Logout</a
          >
          {% else %}
          <!-- Login pannala na (Example: Login page-la) Login link mattum kaattalaam -->
          <a href="{% url 'login' %}" class="btn btn-sm btn-outline-light"
            >Login</a
          >
          {% endif %}
        </div>
      </div>
    </nav>
    <div class="container">{% block content %}{% endblock %}</div>
  </body>
</html>
