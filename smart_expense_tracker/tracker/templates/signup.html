{% extends 'base.html' %} {% block content %}
<div
  class="container d-flex justify-content-center align-items-center"
  style="min-height: 80vh"
>
  <div
    class="card shadow-lg border-0 p-4"
    style="width: 100%; max-width: 400px; border-radius: 15px"
  >
    <div class="card-body">
      <h2 class="text-center fw-bold mb-4">Create Account</h2>

      <form method="POST">
        {% csrf_token %}

        <!-- Django form fields automatically render here -->
        {% for field in form %}
        <div class="mb-3">
          <label class="form-label fw-bold">{{ field.label }}</label>
          {{ field }} {% if field.help_text %}
          <small class="text-muted d-block">{{ field.help_text }}</small>
          {% endif %} {% for error in field.errors %}
          <p class="text-danger small">{{ error }}</p>
          {% endfor %}
        </div>
        {% endfor %}

        <button
          type="submit"
          class="btn btn-primary w-100 fw-bold py-2 shadow-sm mt-3"
        >
          Sign Up
        </button>
      </form>

      <div class="text-center mt-4">
        <p class="small text-muted">
          Already have an account?
          <a href="{% url 'login' %}" class="text-decoration-none fw-bold"
            >Login</a
          >
        </p>
      </div>
    </div>
  </div>
</div>

<!-- Styling to make Django's default form look like your image_1cb63d.png -->
<style>
  input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ced4da;
    border-radius: 8px;
    outline: none;
  }
  input:focus {
    border-color: #4facfe;
    box-shadow: 0 0 5px rgba(79, 172, 254, 0.5);
  }
</style>
{% endblock %}
